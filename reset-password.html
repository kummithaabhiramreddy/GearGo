<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - GearGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --card: #1a1a26;
            --border: #2a2a3d;
            --accent: #f0e040;
            --accent2: #4ef0a0;
            --accent3: #f04e7a;
            --text: #f0f0f8;
            --muted: #888899;
            --radius: 16px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 14px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .btn:hover {
            background: #ffe800;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #message {
            margin-top: 20px;
            font-size: 0.9rem;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }

        .error { background: rgba(240, 78, 122, 0.1); color: var(--accent3); display: block !important; }
        .success { background: rgba(78, 240, 160, 0.1); color: var(--accent2); display: block !important; }

        .loader {
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container" id="resetBox">
        <div id="loadingView">
            <div class="loader"></div>
            <span>Verifying reset link...</span>
        </div>

        <div id="formView" style="display: none;">
            <h1>New Password</h1>
            <p>Enter a secure new password for <br><b id="userEmail" style="color: var(--accent2);"></b></p>
            
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPass" placeholder="••••••••">
            </div>
            
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPass" placeholder="••••••••">
            </div>
            
            <button class="btn" id="submitBtn" onclick="handleReset()">Change Password</button>
        </div>

        <div id="message"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        let email = '';

        async function verifyToken() {
            if (!token) {
                showMessage('Invalid or missing reset token.', 'error');
                document.getElementById('loadingView').style.display = 'none';
                return;
            }

            try {
                const res = await fetch('/api/auth-flow/verify-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                
                const data = await res.json();
                if (data.success) {
                    email = data.email;
                    document.getElementById('userEmail').textContent = email;
                    document.getElementById('loadingView').style.display = 'none';
                    document.getElementById('formView').style.display = 'block';
                } else {
                    showMessage(data.message || 'Link expired or invalid.', 'error');
                    document.getElementById('loadingView').style.display = 'none';
                }
            } catch (err) {
                showMessage('Connection error. Please try again.', 'error');
                document.getElementById('loadingView').style.display = 'none';
            }
        }

        async function handleReset() {
            const np = document.getElementById('newPass').value;
            const cp = document.getElementById('confirmPass').value;
            const btn = document.getElementById('submitBtn');

            if (np.length < 6) return showMessage('Password must be at least 6 characters.', 'error');
            if (np !== cp) return showMessage('Passwords do not match.', 'error');

            btn.disabled = true;
            btn.textContent = 'Updating...';

            // Since accounts are in localStorage, we update it directly here
            // Note: This only works if opened in the same browser context as the original site
            try {
                const accounts = JSON.parse(localStorage.getItem('gearGo_accounts') || '{}');
                if (accounts[email]) {
                    accounts[email].password = np;
                    localStorage.setItem('gearGo_accounts', JSON.stringify(accounts));
                    
                    showMessage('✅ Password updated successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/index.html?signin=' + encodeURIComponent(email);
                    }, 2000);
                } else {
                    showMessage('Error: Local account not found. Please try on the device you used to sign up.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Change Password';
                }
            } catch (e) {
                showMessage('Unexpected error updating password.', 'error');
                btn.disabled = false;
            }
        }

        function showMessage(text, type) {
            const m = document.getElementById('message');
            m.textContent = text;
            m.className = type;
        }

        verifyToken();
    </script>
</body>
</html>

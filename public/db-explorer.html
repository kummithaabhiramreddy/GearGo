<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearGo | Database Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #22c55e;
            --error: #ef4444;
            --border: #334155;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-light), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            color: var(--text);
            opacity: 0.5;
            font-weight: 400;
            font-size: 0.9rem;
        }

        main {
            padding: 2rem;
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--surface);
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            flex-wrap: wrap;
        }

        select,
        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        select:hover,
        button:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button.primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        button.primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .table-container {
            background: var(--surface);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .table-wrap {
            overflow-x: auto;
            max-height: 70vh;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.25rem 1.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            white-space: nowrap;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(99, 102, 241, 0.05);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
        }

        .status-active {
            background: rgba(34, 197, 94, 0.1);
            color: var(--accent);
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 4rem;
        }

        .loader::after {
            content: "";
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            padding: 4rem;
            text-align: center;
            color: var(--text-muted);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">GearGo <span>Database Explorer</span></div>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <div id="connectionStatus"
                style="font-size: 0.8rem; color: var(--accent); display: flex; align-items: center; gap: 0.5rem;">
                <span style="width: 8px; height: 8px; background: var(--accent); border-radius: 50%;"></span>
                Connected to PostgreSQL
            </div>
            <button onclick="window.location.href='/admin'" style="padding: 0.5rem 1rem; font-size: 0.8rem; background: rgba(255,255,255,0.05);">Back to Dashboard</button>
        </div>
    </header>

    <main>
        <div class="controls">
            <select id="tableSelect">
                <option value="rentals">Rentals / Bookings</option>
                <option value="items">Marketplace Items</option>
                <option value="delivery_boys">Delivery Partners</option>
                <option value="stores">Hubs & Stores</option>
                <option value="reviews">Customer Reviews</option>
                <option value="support_requests">Support Requests</option>
            </select>
            <button class="primary" onclick="fetchTableData()">Refresh Data</button>
            <div style="flex: 1;"></div>
            <div id="recordCount" style="color: var(--text-muted); font-size: 0.9rem; align-self: center;">
                No data loaded
            </div>
        </div>

        <div class="table-container">
            <div id="loader" class="loader"></div>
            <div id="tableWrap" class="table-wrap">
                <div class="empty-state">Select a table and click Refresh to begin</div>
            </div>
        </div>
    </main>

    <script>
        async function fetchTableData() {
            const table = document.getElementById('tableSelect').value;
            const wrap = document.getElementById('tableWrap');
            const loader = document.getElementById('loader');
            const count = document.getElementById('recordCount');

            wrap.style.display = 'none';
            loader.style.display = 'block';

            try {
                const isLocal = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') && window.location.port !== '3000';
                const apiBase = '';

                const res = await fetch(`${apiBase}/api/db/${table}`);
                const data = await res.json();

                loader.style.display = 'none';
                wrap.style.display = 'block';

                if (!data || data.length === 0) {
                    wrap.innerHTML = '<div class="empty-state">No records found in this table</div>';
                    count.textContent = '0 Records';
                    return;
                }

                count.textContent = `${data.length} Records found`;

                // Build Table
                const headers = Object.keys(data[0]);
                let html = `<table><thead><tr>`;
                headers.forEach(h => html += `<th>${h}</th>`);
                html += `</tr></thead><tbody>`;

                data.forEach(row => {
                    html += `<tr>`;
                    headers.forEach(h => {
                        let val = row[h];
                        if (val === null) val = '<span style="opacity: 0.3">null</span>';
                        else if (typeof val === 'object') val = JSON.stringify(val);

                        // Specific styling for status
                        if (h === 'status' || h === 'track_status') {
                            const statusClass = val === 'active' || val === 'delivered' ? 'status-active' : 'status-pending';
                            html += `<td><span class="status-badge ${statusClass}">${val}</span></td>`;
                        } else {
                            html += `<td title="${val}">${val}</td>`;
                        }
                    });
                    html += `</tr>`;
                });

                html += `</tbody></table>`;
                wrap.innerHTML = html;

            } catch (err) {
                loader.style.display = 'none';
                wrap.style.display = 'block';
                wrap.innerHTML = `<div class="empty-state" style="color: var(--error)">Error fetching data: ${err.message}</div>`;
            }
        }

        // Load default table on start
        window.onload = () => {
            // Optional: auto load rentals
            // fetchTableData();
        };
    </script>

</body>

</html>
